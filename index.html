<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyXing</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="description" content="SkyXing - 自由创作，分享你的想法" />
  <!-- 首屏防白屏：在样式与 React 加载前同步应用主题，避免浅色闪烁 -->
  <script>
    (function () {
      try {
        var saved = JSON.parse(localStorage.getItem('skyxing_settings') || '{}');
        var theme = saved && saved.theme ? saved.theme : 'dark';
        var root = document.documentElement;
        root.setAttribute('data-theme', theme);
        // 直接给 html 设置背景，避免 CSS 解析前的默认白底闪烁
        root.style.backgroundColor = theme === 'dark' ? '#202020' : '#ffffff';
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.documentElement.style.backgroundColor = '#202020';
      }
    })();
  </script>
</head>
<body class="font-win">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
